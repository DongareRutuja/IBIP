<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body >

<div class="card">

    <div class="search">
        <input type="text" placeholder="Enter City Name" id="city">
        <button onclick="getWeather()">Search</button>
    </div>

    <div class="weather">
        <h2 id="cityName"></h2>
        <h1 id="temp"></h1>
        <img id="icon">
        <h3 id="condition"></h3>
        <p id="time"></p>

        <div class="details">
            <p>Humidity: <span id="humidity"></span></p>
            <p>Wind Speed: <span id="wind"></span></p>
        </div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
